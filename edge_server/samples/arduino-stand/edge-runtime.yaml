runtime:
  edgeId: 507f1f77bcf86cd799439011
  stateDir: C:\ProgramData\vkr-edge\state
  instanceName: arduino-stand-edge

cloud:
  url: ${EDGE_CLOUD_URL}
  namespace: /edge
  connectTimeoutMs: 10000
  reconnect:
    baseDelayMs: 1000
    maxDelayMs: 30000
    maxAttempts: 0

batch:
  intervalMs: 1000
  maxReadings: 100

sources:
  - sourceId: arduino_stand
    adapterKind: modbus_rtu
    enabled: true
    pollIntervalMs: 1000
    connection:
      port: ${EDGE_MODBUS_PORT}
      baudRate: 9600
      dataBits: 8
      parity: none
      stopBits: 1
      slaveId: 1
      timeoutMs: 500
    devices:
      - deviceId: environment
        address:
          node: 1
        metrics:
          - metric: temperature
            valueType: number
            mapping:
              registerType: input
              address: 0
              scale: 0.1
          - metric: humidity
            valueType: number
            mapping:
              registerType: input
              address: 1
              scale: 0.1
      - deviceId: pump_main
        address:
          node: 2
        metrics:
          - metric: actual_state
            valueType: boolean
            mapping:
              registerType: input
              address: 16
          - metric: local_button_pressed
            valueType: boolean
            mapping:
              registerType: input
              address: 2
      - deviceId: siren_alert
        address:
          node: 3
        metrics:
          - metric: actual_state
            valueType: boolean
            mapping:
              registerType: input
              address: 17
      - deviceId: valve_pwm
        address:
          node: 4
        metrics:
          - metric: actual_value
            valueType: number
            mapping:
              registerType: input
              address: 18

logging:
  level: info
