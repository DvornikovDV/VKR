runtime:
  edgeId: 507f1f77bcf86cd799439011
  stateDir: ${RUNTIME_STATE_DIR}
  instanceName: fixture-edge-mock

cloud:
  url: ${CLOUD_SOCKET_URL}
  namespace: /edge
  connectTimeoutMs: 10000
  reconnect:
    baseDelayMs: 1000
    maxDelayMs: 30000
    maxAttempts: 0

batch:
  intervalMs: 1000
  maxReadings: 100

sources:
  - sourceId: mock-source-1
    adapterKind: mock
    enabled: true
    pollIntervalMs: 1000
    connection:
      profile: default
    devices:
      - deviceId: pump-1
        address:
          node: 1
        metrics:
          - metric: pressure
            valueType: number
            mapping:
              register: 40001

logging:
  level: info
