<!DOCTYPE html>
<html lang="ru">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор мнемосхем</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/konva@8.3.2/konva.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-constructor-standalone="true">
    <!-- Шапка с панелью инструментов -->
    <header class="toolbar-header">
        <div class="toolbar-content">
            <div class="toolbar-left">
                <h1 class="app-title">Конструктор мнемосхем</h1>
            </div>
            
            <div class="toolbar-center">
                <!-- Файл -->
                <div class="dropdown me-3">
                    <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Файл
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#" id="add-image-btn">Добавить изображение</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="save-schema-btn">Сохранить структуру</a></li>
                        <li><a class="dropdown-item" href="#" id="load-schema-btn">Загрузить структуру</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="save-bindings-btn">Сохранить привязки</a></li>
                        <li><a class="dropdown-item" href="#" id="load-bindings-btn">Загрузить привязки</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="clear-btn">Очистить</a></li>
                    </ul>
                </div>


            </div>

            <!-- Центр панели: иконки действий -->
            <div class="toolbar-icons" role="group" aria-label="tools">
                <button id="undo-btn" type="button" class="btn btn-warning text-dark btn-square" title="Отменить (Undo)" data-bs-toggle="tooltip">⭶</button>
                <button id="create-line-btn" type="button" class="btn btn-primary btn-square" title="Создать линию (переключение)" data-bs-toggle="tooltip">／</button>
                <button id="delete-selected-btn" type="button" class="btn btn-danger btn-square" title="Удалить выбранное" data-bs-toggle="tooltip">🗑</button>
            </div>

            <!-- Правая часть: машина + масштаб -->
            <div class="toolbar-right">
                <label for="machine-select" class="zoom-label">Машина:</label>
                <select id="machine-select" class="form-select form-select-sm" style="width: auto; min-width: 150px; margin-right: 1rem;">
                    <option value="">без подписки</option>
                    <option value="machine-A">Котел A</option>
                    <option value="machine-B">Котел B</option>
                </select>

                <label for="zoom-slider" class="zoom-label">Масштаб:</label>
                <input type="range" class="zoom-slider" id="zoom-slider" min="0.1" max="10" step="0.1" value="1">
                <span id="zoom-value" class="zoom-value">1.0x</span>
            </div>
        </div>
    </header>

    <!-- Основная рабочая область -->
    <main class="main-workspace">
        <div class="workspace-container">
            <!-- Canvas -->
            <div class="canvas-area">
                <div id="canvas-container" class="canvas-wrapper">
                    <div id="canvas"></div>
                </div>
            </div>

            <!-- Боковая панель: свойства -->
            <aside class="properties-panel">
                <!-- Стандартная панель свойств -->
                <div class="properties-header">
                    <h5>Свойства</h5>
                </div>
                <div class="properties-content">
                    <div id="properties-content">
                        <p class="text-muted">Выберите элемент для редактирования свойств</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Скрытый input для загрузки файлов -->
    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Контекстное меню и основной скрипт -->
    <script type="module" src="main.js"></script>
</body>
</html>
