openapi: 3.0.3
info:
  title: VKR SCADA Cloud Server API
  description: Central Platform for Managing Diagrams, Telemetry Routing, and User Sessions.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:4000
    description: Local development server

paths:
  /api/auth/register:
    post:
      operationId: registerUser
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '400':
          description: Invalid input

  /api/auth/login:
    post:
      operationId: loginUser
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/admin/users:
    get:
      operationId: getAdminUsers
      summary: Get paginated list of all users (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated users array
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  total:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  
  /api/admin/users/{id}/tier:
    patch:
      operationId: updateAdminUserTier
      summary: Update user subscription tier (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tier:
                  type: string
                  enum: [FREE, PRO]
      responses:
        '200':
          description: Tier updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid tier
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/admin/users/{id}/status:
    patch:
      operationId: updateAdminUserStatus
      summary: Update user banned status (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isBanned:
                  type: boolean
      responses:
        '200':
          description: Ban status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/admin/edge-servers:
    get:
      operationId: getAdminEdgeServers
      summary: List all edge servers globally (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of all edge servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/diagrams:
    get:
      operationId: getUserDiagrams
      summary: Get all diagrams owned by user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of Mnemonic Diagrams
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
    post:
      operationId: createDiagram
      summary: Create a new mnemonic diagram ("Save As" — always creates new _id)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - layout
              properties:
                name:
                  type: string
                layout:
                  type: object
                  description: Visual geometry (images, connectionPoints, connections, widgets). No binding data.
      responses:
        '201':
          description: Returns the created diagram
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: FREE user diagram quota (3) exceeded
          
  /api/diagrams/{id}:
    get:
      operationId: getDiagramById
      summary: Get diagram by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current version of the diagram
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      operationId: replaceDiagram
      summary: Save diagram layout in-place ("Save", with OCC)
      description: >
        Replaces `layout` and `name`. Existing DiagramBindings are NOT deleted. If bindings exist, response includes `bindingsInvalidated: true`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - __v
              properties:
                name:
                  type: string
                layout:
                  type: object
                  description: Full visual geometry replacement
                __v:
                  type: number
                  description: Expected OCC version key (Mongoose __v)
      responses:
        '200':
          description: Layout replaced successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      bindingsInvalidated:
                        type: boolean
                        description: true if DiagramBindings exist and may now reference stale widgetIds
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Version conflict — another session already updated this diagram
          
    delete:
      operationId: deleteDiagram
      summary: Hard Delete a Mnemonic Diagram
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Diagram successfully removed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /api/diagrams/{id}/assign:
    post:
      operationId: assignDiagram
      summary: Assign own diagram to another user (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - targetUserId
              properties:
                targetUserId:
                  type: string
      responses:
        '200':
          description: Diagram ownership transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Admin does not own this diagram
        '404':
          description: Not found

  /api/diagrams/{id}/bindings:
    get:
      operationId: getDiagramBindings
      summary: Get all DiagramBindings for a diagram
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of DiagramBindings documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    post:
      operationId: replaceDiagramBindings
      summary: Create or replace a DiagramBindings set for a given edgeServerId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - edgeServerId
                - widgetBindings
              properties:
                edgeServerId:
                  type: string
                widgetBindings:
                  type: array
                  items:
                    type: object
                    properties:
                      widgetId:
                        type: string
                      deviceId:
                        type: string
                      metric:
                        type: string
      responses:
        '200':
          description: Binding set replaced (same diagramId+edgeServerId pair already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '201':
          description: Binding set created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: edgeServer not in user's trustedUsers (FR-8)
        '404':
          description: Not found
    delete:
      operationId: deleteAllDiagramBindings
      summary: Delete all DiagramBindings sets for a diagram
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Idempotent delete completed; all binding sets for the diagram were removed (or already absent)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Diagram not found

  /api/diagrams/{id}/bindings/{edgeServerId}:
    delete:
      operationId: deleteDiagramBindings
      summary: Delete a specific DiagramBindings set
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: edgeServerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Binding set deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /api/edge-servers:
    get:
      operationId: getUserEdgeServers
      summary: List Edge Servers linked to User
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of connected servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
    post:
      operationId: createEdgeServer
      summary: Register a new Edge Server and disclose its one-time onboarding package (Admin Only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Edge registered and onboarding package disclosed once
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    required:
                      - edge
                      - onboardingPackage
                    properties:
                      edge:
                        $ref: '#/components/schemas/AdminEdgeServerRecord'
                      onboardingPackage:
                        type: object
                        required:
                          - edgeId
                          - onboardingSecret
                          - issuedAt
                          - expiresAt
                          - instructions
                        properties:
                          edgeId:
                            type: string
                          onboardingSecret:
                            type: string
                          issuedAt:
                            type: string
                            format: date-time
                          expiresAt:
                            type: string
                            format: date-time
                          instructions:
                            type: string
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/edge-servers/{edgeId}/bind:
    post:
      operationId: bindEdgeServerToUser
      summary: Assign User access to Edge Server (Admin Only)
      security:
        - bearerAuth: []
      parameters:
        - name: edgeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: Appended owner reference successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /api/edge-servers/{edgeId}/catalog:
    get:
      operationId: getEdgeServerCatalog
      summary: Get device and metric catalog for a trusted edge server
      description: >
        Returns a read-only machine-scoped catalog derived from telemetry already known to Cloud.
        Intended for hosted constructor binding UI. USER must be trusted for the selected edge server.
        Canonical catalog identity within one edge is `deviceId + metric`.
      security:
        - bearerAuth: []
      parameters:
        - name: edgeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog entries for the selected edge server
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EdgeCatalogEntry'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Edge server not found

  /api/edge-servers/{edgeId}/ping:
    get:
      operationId: pingEdgeServer
      summary: Check Edge Server connectivity status (Admin only)
      description: Returns online status based on canonical `lastSeenAt` from Socket.IO or persisted availability metadata.
      security:
        - bearerAuth: []
      parameters:
        - name: edgeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connectivity status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      online:
                        type: boolean
                      lastSeenAt:
                        type: string
                        format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Edge Server not found

  /api/users/me/stats:
    get:
      operationId: getUserStats
      summary: Get user profile statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Includes diagramCount and edgeServerCount
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      diagramCount:
                        type: integer
                      edgeServerCount:
                        type: integer
        '401':
          description: Unauthorized

  /api/users/me/password:
    patch:
      operationId: changePassword
      summary: Change user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
    post:
      operationId: changePasswordLegacy
      summary: Change user password (legacy alias)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccess'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/users/me:
    get:
      operationId: getSelfProfile
      summary: Get current self profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current persisted user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      email:
                        type: string
                        format: email
                      role:
                        type: string
                        enum: [ADMIN, USER]
                      subscriptionTier:
                        type: string
                        enum: [FREE, PRO]
        '401':
          description: Unauthorized
    delete:
      operationId: deleteUser
      summary: Soft-delete own user account
      description: Sets `isDeleted` flag to true. Existing edge server assignments and telemetry references are preserved for audit purposes.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account soft-deleted successfully
        '401':
          description: Unauthorized

components:
  schemas:
    JSendSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          description: Any returned entity data
    AuthSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            token:
              type: string
            user:
              type: object
    EdgeCatalogEntry:
      type: object
      required:
        - edgeServerId
        - deviceId
        - metric
        - label
      properties:
        edgeServerId:
          type: string
        deviceId:
          type: string
        metric:
          type: string
        label:
          type: string
    EdgeAvailabilitySnapshot:
      type: object
      required:
        - online
        - lastSeenAt
      properties:
        online:
          type: boolean
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
    EdgeOnboardingPackageSummary:
      type: object
      nullable: true
      properties:
        credentialId:
          type: string
        status:
          type: string
          enum: [ready, used, expired, reset, blocked]
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        usedAt:
          type: string
          format: date-time
          nullable: true
        displayHint:
          type: string
          nullable: true
    EdgeServerUserRef:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, USER]
        subscriptionTier:
          type: string
          enum: [FREE, PRO]
    AdminEdgeServerRecord:
      type: object
      required:
        - _id
        - name
        - trustedUsers
        - createdBy
        - lifecycleState
        - isTelemetryReady
        - availability
        - currentOnboardingPackage
        - persistentCredentialVersion
        - lastLifecycleEventAt
      properties:
        _id:
          type: string
        name:
          type: string
        trustedUsers:
          type: array
          items:
            oneOf:
              - type: string
              - $ref: '#/components/schemas/EdgeServerUserRef'
        createdBy:
          type: object
          nullable: true
          properties:
            _id:
              type: string
            email:
              type: string
              format: email
        lifecycleState:
          type: string
          enum:
            - Pending First Connection
            - Active
            - Re-onboarding Required
            - Blocked
        isTelemetryReady:
          type: boolean
        availability:
          $ref: '#/components/schemas/EdgeAvailabilitySnapshot'
        currentOnboardingPackage:
          $ref: '#/components/schemas/EdgeOnboardingPackageSummary'
        persistentCredentialVersion:
          type: integer
          nullable: true
        lastLifecycleEventAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
